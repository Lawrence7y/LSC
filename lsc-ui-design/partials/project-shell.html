<!-- project-shell.html — Shared app shell fragment (sidebar + page frame) -->
<!-- Injected into full pages; do NOT include html/head/body. -->
<!-- Requires: Apple Design Library colors_and_type.css, Tailwind CDN -->

<style>
  /* ===== Project Shell Scoped Styles ===== */
  .app-shell {
    display: flex;
    width: 100%;
    height: 100vh;
    background: var(--background-900);
    font-family: 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
    font-size: 13px;
    color: var(--text-50);
    overflow: hidden;
  }

  /* Sidebar */
  .app-sidebar {
    width: 200px;
    min-width: 200px;
    height: 100vh;
    background: var(--background-800);
    border-right: 1px solid var(--border-default);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 0;
    user-select: none;
    -webkit-app-region: drag;
  }

  /* Logo area */
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 24px 16px;
    border-bottom: 1px solid var(--border-default);
  }
  .sidebar-logo .logo-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--brand-500);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sidebar-logo .logo-icon svg {
    width: 18px;
    height: 18px;
    color: #ffffff;
  }
  .sidebar-logo .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-50);
    line-height: 1;
  }
  .sidebar-logo .logo-subtext {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-400);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }

  /* Navigation */
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    gap: 2px;
    flex: 1;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    margin: 0 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    color: var(--text-300);
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
    border-left: 3px solid transparent;
    position: relative;
    -webkit-app-region: no-drag;
  }
  .nav-item:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-50);
  }
  .nav-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.15s ease;
  }
  .nav-item:hover svg {
    opacity: 1;
  }

  /* Active nav item — SLOT: activeNavItem controls which nav-item gets .active class */
  .nav-item.active {
    background: rgba(0, 122, 255, 0.12);
    color: #ffffff;
    border-left: 3px solid var(--brand-500);
    font-weight: 500;
  }
  .nav-item.active svg {
    opacity: 1;
    color: var(--brand-500);
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 12px 0 16px 0;
    border-top: 1px solid var(--border-default);
  }
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    margin: 0 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    color: var(--text-400);
    font-size: 13px;
    font-weight: 400;
    -webkit-app-region: no-drag;
  }
  .theme-toggle:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-50);
  }
  .theme-toggle svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.15s ease;
  }
  .theme-toggle:hover svg {
    opacity: 1;
  }

  /* Main content area */
  .app-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--background-900);
  }

  /* Page header bar */
  .page-header {
    height: 64px;
    min-height: 64px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-default);
    background: var(--background-900);
    -webkit-app-region: drag;
  }
  .page-header-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-50);
    letter-spacing: -0.01em;
  }

  /* Content area */
  .page-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
</style>

<div class="app-shell">
  <!-- ===== Sidebar ===== -->
  <aside class="app-sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <!-- Inline scissors icon for LSC branding -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">LSC</div>
        <div class="logo-subtext">Live Stream Clipper</div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <!-- Nav: Dashboard -->
      <a class="nav-item <!-- SLOT: activeNavItem -->" data-nav-key="dashboard" href="dashboard.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-icon="house">
          <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span>仪表盘</span>
      </a>

      <!-- Nav: Multi-room -->
      <a class="nav-item <!-- SLOT: activeNavItem -->" data-nav-key="multi-room" href="multi-room.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-icon="box">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
        </svg>
        <span>多房间管理</span>
      </a>

      <!-- Nav: Settings -->
      <a class="nav-item <!-- SLOT: activeNavItem -->" data-nav-key="settings" href="settings.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-icon="pen-line">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
        </svg>
        <span>设置</span>
      </a>
    </nav>

    <!-- Footer: Theme Toggle -->
    <div class="sidebar-footer">
      <div class="theme-toggle" data-action="toggle-theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-icon="chevrons-up-down">
          <path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/>
        </svg>
        <span>切换主题</span>
      </div>
    </div>
  </aside>

  <!-- ===== Main Content Area ===== -->
  <main class="app-main">
    <!-- Page Header Bar -->
    <header class="page-header">
      <h1 class="page-header-title"><!-- SLOT: pageTitle --></h1>
    </header>

    <!-- Page Content Area -->
    <div class="page-content">
      <!-- SLOT: pageContent -->
    </div>
  </main>
</div>
