<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSC - 修改后 UI 原型</title>
<style>
/* ===== DESIGN TOKENS (from tokens.css) ===== */
:root {
  --brand-50: #e8f2ff; --brand-100: #cfe5ff; --brand-200: #9fcbff;
  --brand-300: #66abff; --brand-400: #2e8dff; --brand-500: #007aff;
  --brand-600: #0064d6; --brand-700: #004fad; --brand-800: #003b82; --brand-900: #00275a;
  --background-50: #ffffff; --background-100: #f7f7fa; --background-200: #f2f2f7;
  --background-300: #e5e5ea; --background-400: #d1d1d6; --background-500: #aeaeb2;
  --background-600: #8e8e93; --background-700: #3a3a3c; --background-800: #1c1c1e; --background-900: #000000;
  --text-50: #f5f5f7; --text-100: #e3e3e8; --text-200: #c7c7cc; --text-300: #aeaeb2;
  --text-400: #8e8e93; --text-500: #6e6e73; --text-600: #48484a; --text-700: #3c3c43;
  --state-success: #34c759; --state-error: #ff3b30; --state-warning: #ff9500;
  --border-default: rgba(255,255,255,0.08);
  --bg-primary: var(--background-900); --bg-secondary: var(--background-800); --bg-tertiary: var(--background-700);
  --text-primary: var(--text-50); --text-secondary: var(--text-200); --text-tertiary: var(--text-400);
  --accent-primary: var(--brand-500); --accent-primary-dim: var(--brand-400);
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.36);
  --shadow-md: 0 4px 8px -2px rgba(0,0,0,0.44);
  --shadow-lg: 0 8px 24px -8px rgba(0,0,0,0.50);
  --font-sans: 'SF Pro Display','PingFang SC',system-ui,-apple-system,sans-serif;
  --font-mono: 'SF Mono','JetBrains Mono','Menlo',monospace;
  --radius: 14px; --radius-sm: 10px; --radius-md: 8px; --radius-lg: 18px;
}
:root:not(.dark), html:not(.dark) {
  --background-700: #f0f1f4; --background-800: #ffffff; --background-900: #f5f6f8;
  --text-50: #1a1d23; --text-100: #3c3c43; --text-200: #4a5160; --text-300: #6b7280; --text-400: #8e8e93;
  --border-default: rgba(0,0,0,0.08);
  --bg-primary: #f5f6f8; --bg-secondary: #ffffff; --bg-tertiary: #f0f1f4;
  --text-primary: #1a1d23; --text-secondary: #4a5160; --text-tertiary: #6b7280;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.06);
  --shadow-md: 0 2px 6px rgba(0,0,0,0.08);
  --shadow-lg: 0 6px 16px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-50);
  transition: background-color .3s ease, color .3s ease; overflow: hidden; height: 100vh;
}
.theme-transition * { transition: background-color .3s ease, color .3s ease, border-color .3s ease, box-shadow .3s ease !important; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--text-400); border-radius: 3px; opacity: 0.5; }
::-webkit-scrollbar-track { background: transparent; }

/* ===== LAYOUT ===== */
.app-layout { display: flex; height: 100vh; overflow: hidden; }

/* ===== SIDEBAR (问题7: 连接状态+重连移到此处, 问题8: 主题切换在底部居中) ===== */
.sidebar {
  width: 200px; background: var(--bg-secondary); border-right: 1px solid var(--border-default);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px; padding: 20px 16px 24px;
  border-bottom: 1px solid var(--border-default);
}
.sidebar-logo .logo-icon {
  width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0;
}
.sidebar-logo .logo-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: var(--text-50); line-height: 1; }
.sidebar-logo .logo-sub { font-size: 10px; font-weight: 400; color: var(--text-400); margin-top: 2px; letter-spacing: 0.01em; }

.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer;
  font-size: 14px; color: var(--text-200); transition: all .15s ease; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-50); }
.nav-item.active { color: var(--accent-primary); border-left-color: var(--accent-primary); background: rgba(0,122,255,0.08); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

/* 问题7+8: Footer - 连接状态(4种状态) + 重连按钮 + 主题切换(底部居中) */
.sidebar-footer {
  padding: 10px 12px 14px; border-top: 1px solid var(--border-default);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.conn-status-container {
  display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%;
}
.conn-status-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 4px 10px; border-radius: 6px; background: var(--bg-tertiary); border: 1px solid var(--border-default);
  width: 100%;
}
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}
.conn-dot.connected { background: var(--state-success); color: var(--state-success); }
.conn-dot.connecting { background: var(--state-warning); color: var(--state-warning); animation: pulse 1.5s infinite; }
.conn-dot.disconnected { background: var(--state-error); color: var(--state-error); }
.conn-dot.reconnect_failed { background: var(--state-error); color: var(--state-error); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.conn-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.reconnect-btn {
  display: none; align-items: center; justify-content: center; gap: 4px;
  padding: 4px 12px; border-radius: 6px; background: var(--state-error); color: #fff;
  border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: opacity .15s;
}
.reconnect-btn.show { display: flex; }
.reconnect-btn:hover { opacity: 0.85; }
.reconnect-btn svg { width: 14px; height: 14px; }

/* 问题8: 主题切换按钮在底部居中 */
.theme-toggle {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 6px 16px; border-radius: 8px; background: transparent; border: 1px solid var(--border-default);
  cursor: pointer; font-size: 12px; color: var(--text-50); transition: all .15s;
  margin-top: 4px;
}
.theme-toggle:hover { background: var(--bg-tertiary); }
.theme-toggle svg { width: 16px; height: 16px; }

/* ===== MAIN AREA (问题7: 删除了顶部标题和右侧连接状态指示) ===== */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* 不再有 Header — 问题7要求删除顶部标题"多房间管理"和右侧连接状态指示 */
/* 仅保留断连时的 Banner */
.conn-banner {
  display: none; height: 36px; background: var(--state-error); color: #fff;
  align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex-shrink: 0;
}
.conn-banner.show { display: flex; }
.conn-banner button { background: transparent; border: none; color: #fff; cursor: pointer; font-size: 12px; opacity: 0.8; }

.content-area { flex: 1; overflow: auto; background: var(--bg-primary); }

/* ===== WORKBENCH ===== */
.workbench { display: flex; height: 100%; }
.wb-left { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.wb-right { width: 340px; border-left: 1px solid var(--border-default); overflow-y: auto; background: var(--bg-primary); flex-shrink: 0; }

/* 顶部操作栏 */
.wb-toolbar {
  padding: 12px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default);
  display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0;
}
.wb-toolbar-left { display: flex; align-items: center; gap: 12px; }
.wb-toolbar h2 { margin: 0; font-size: 16px; font-weight: 600; color: var(--text-50); }
.wb-toolbar .room-count { color: var(--text-400); font-size: 13px; }
.toolbar-select {
  padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-default);
  background: var(--bg-tertiary); color: var(--text-200); font-size: 12px; cursor: pointer; outline: none;
}
.toolbar-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border-default);
  background: var(--bg-tertiary); color: var(--text-200); font-size: 12px; cursor: pointer; transition: all .15s;
  display: inline-flex; align-items: center; gap: 4px;
}
.toolbar-btn:hover { background: var(--bg-secondary); color: var(--text-50); }
.toolbar-btn.primary { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }
.toolbar-btn.primary:hover { background: var(--brand-600); }
.toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.toolbar-btn svg { width: 14px; height: 14px; }

/* 房间卡片网格 */
.room-grid {
  flex: 1; overflow: auto; padding: 16px 20px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; align-content: start;
}
.room-card {
  background: var(--bg-secondary); border: 1px solid transparent; border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer; transition: all .15s ease; position: relative;
}
.room-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.room-card.selected {
  background: var(--bg-tertiary);
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(0,122,255,0.12), 0 0 16px rgba(0,122,255,0.22);
}
/* 问题2: 多选时也用蓝色边框，不再用橙色"已同步" */
.room-card.multi-selected {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 2px rgba(0,122,255,0.15), 0 0 12px rgba(0,122,255,0.12);
}

/* 问题1: Checkbox 修复后可正常取消勾选 */
.room-checkbox {
  position: absolute; top: 8px; left: 8px; z-index: 5;
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.45); background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s ease; color: #fff; font-size: 13px; font-weight: 700; line-height: 1; user-select: none;
}
.room-checkbox.checked {
  border-color: var(--accent-primary); background: var(--accent-primary);
}

/* 预览区域 */
.room-preview {
  width: 100%; height: 180px; background: #0a0a0a; border-radius: 8px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
}
.room-preview .placeholder { color: var(--text-400); font-size: 24px; }
.room-preview .preview-video {
  width: 100%; height: 100%; object-fit: contain; background: #000;
}

/* 预览覆盖控制条 */
.preview-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); z-index: 3;
}
.preview-quality-select {
  padding: 2px 6px; border-radius: 4px; border: none; background: rgba(0,0,0,0.5);
  color: #fff; font-size: 11px; cursor: pointer; backdrop-filter: blur(8px); outline: none;
}
.preview-quality-select.applying { opacity: 0.6; pointer-events: none; }
.preview-controls { display: flex; gap: 4px; }
.preview-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none; background: rgba(0,0,0,0.5);
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); transition: all .15s;
}
.preview-btn:hover { background: rgba(0,122,255,0.5); }
.preview-btn svg { width: 16px; height: 16px; }
.preview-btn.muted { color: var(--state-error); }

/* 状态 badge */
.room-status-badge {
  position: absolute; top: 8px; left: 38px; display: flex; align-items: center; gap: 6px; z-index: 4;
}
.status-pill {
  display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px); padding: 3px 8px; border-radius: 6px;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-dot.recording { background: var(--state-error); box-shadow: 0 0 8px var(--state-error); animation: pulse 1.5s infinite; }
.status-dot.live { background: var(--state-success); }
.status-dot.connecting { background: var(--state-warning); }
.status-dot.error { background: var(--state-error); }
.status-text { font-size: 11px; color: #fff; font-weight: 500; }

/* 问题2: "已选中"标签(蓝色) 替代 "已同步"(橙色) */
.selected-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px; border-radius: 4px;
  font-size: 9px; font-weight: 600; background: rgba(0,122,255,0.15); color: var(--brand-300);
  border: 1px solid rgba(0,122,255,0.3); flex-shrink: 0;
}
.selected-badge .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent-primary); }

/* 房间信息 */
.room-info { padding: 0 12px 12px; }
.room-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 6px; }
.room-title { font-size: 13px; font-weight: 600; color: var(--text-50); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.room-platform { font-size: 11px; color: var(--text-400); flex-shrink: 0; }
.room-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-400); }
.room-meta .time { font-family: var(--font-mono); }

/* ===== CONTROL BAR + TIMELINE (问题2: 多选时时间线正常工作) ===== */
.control-bar {
  padding: 8px 16px; background: var(--bg-secondary); border-top: 1px solid var(--border-default);
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
}
.cb-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.cb-controls { display: flex; align-items: center; gap: 4px; }
.cb-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
  color: var(--text-200); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.cb-btn:hover { background: var(--bg-tertiary); color: var(--text-50); }
.cb-btn svg { width: 18px; height: 18px; }
.cb-btn.primary { background: var(--accent-primary); color: #fff; }
.cb-btn.primary:hover { background: var(--brand-600); }
.cb-time { font-family: var(--font-mono); font-size: 13px; color: var(--text-200); display: flex; gap: 2px; align-items: center; }
.cb-time .sep { color: var(--text-400); }

/* 多选指示器 — 问题2: 改为"已选中"而非"已同步" */
.multi-select-indicator {
  display: none; align-items: center; gap: 8px; padding: 4px 12px;
  background: rgba(0,122,255,0.08); border-radius: 6px; font-size: 12px;
  color: var(--brand-300); font-weight: 500;
}
.multi-select-indicator.show { display: flex; }
.multi-select-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-primary); }

/* Timeline */
.timeline-container {
  position: relative; height: 44px; background: var(--bg-tertiary); border-radius: 6px;
  overflow: hidden; cursor: pointer; user-select: none;
}
.timeline-ruler {
  position: absolute; top: 0; left: 0; right: 0; height: 100%;
  background-image: repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.06) 59px, rgba(255,255,255,0.06) 60px);
}
.timeline-tick-label {
  position: absolute; top: 2px; font-size: 9px; color: var(--text-400); font-family: var(--font-mono);
  transform: translateX(-50%);
}
.timeline-buffered {
  position: absolute; top: 0; left: 0; height: 100%;
  background: rgba(0,122,255,0.1); pointer-events: none;
}
.timeline-progress {
  position: absolute; top: 0; left: 0; height: 3px; background: var(--accent-primary);
  pointer-events: none; border-radius: 0 2px 2px 0;
}
.timeline-playhead {
  position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent-primary);
  pointer-events: none; z-index: 3; box-shadow: 0 0 4px var(--accent-primary);
}
.timeline-playhead::after {
  content: ''; position: absolute; top: -2px; left: -4px; width: 10px; height: 10px;
  border-radius: 50%; background: var(--accent-primary); border: 2px solid var(--bg-secondary);
}
.timeline-mark-in {
  position: absolute; top: 0; width: 2px; height: 100%; background: var(--state-success);
  pointer-events: none; z-index: 2;
}
.timeline-mark-in::after {
  content: '入'; position: absolute; top: -1px; left: 3px; font-size: 8px; color: var(--state-success); font-weight: 700;
}
.timeline-mark-out {
  position: absolute; top: 0; width: 2px; height: 100%; background: var(--state-error);
  pointer-events: none; z-index: 2;
}
.timeline-mark-out::after {
  content: '出'; position: absolute; top: -1px; left: 3px; font-size: 8px; color: var(--state-error); font-weight: 700;
}
.timeline-clip {
  position: absolute; top: 20px; height: 16px; border-radius: 3px;
  background: rgba(0,122,255,0.25); border: 1px solid var(--accent-primary); pointer-events: none;
  display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--brand-200);
}
.timeline-labels { display: flex; justify-content: space-between; padding: 0 2px; }
.timeline-labels span { font-size: 9px; color: var(--text-400); font-family: var(--font-mono); }

/* ===== RIGHT PANEL ===== */
.right-panel-section {
  margin: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); overflow: hidden;
}
.right-panel-header {
  padding: 10px 12px; border-bottom: 1px solid var(--border-default);
  display: flex; justify-content: space-between; align-items: center;
}
.right-panel-header h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--text-50); }
.right-panel-body { padding: 10px 12px; }

/* 问题6: 统一录制设置 */
.record-setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.record-setting-row .label { font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; width: 56px; }
.record-setting-row .value { flex: 1; }
.record-select {
  width: 100%; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-default);
  background: var(--bg-tertiary); color: var(--text-200); font-size: 12px; cursor: pointer; outline: none;
}
.record-input {
  width: 100%; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-default);
  background: var(--bg-tertiary); color: var(--text-200); font-size: 12px; outline: none;
}
.crf-slider {
  width: 100%; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
  background: var(--bg-tertiary); outline: none; margin: 4px 0;
}
.crf-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent-primary); cursor: pointer; border: 2px solid var(--bg-secondary);
}
.crf-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary); }
.crf-value { font-weight: 600; color: var(--brand-300); }

/* ===== EXPANDED / FULLSCREEN (问题5: 单一放大按钮, 复用实例) ===== */
.expanded-overlay {
  display: none; position: absolute; inset: 0; z-index: 100; background: #000;
  flex-direction: column;
}
.expanded-overlay.show { display: flex; }
.expanded-video-container { flex: 1; position: relative; overflow: hidden; }
.expanded-video-container video { width: 100%; height: 100%; object-fit: contain; }
.expanded-controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
}
/* 问题5: 只有退出放大按钮, 删除了右上角的全屏按钮, 全屏由 video 原生 controls 提供 */
.exit-expand-btn {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  padding: 6px 12px; border-radius: 8px; border: none; background: rgba(0,0,0,0.6);
  color: #fff; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px;
  backdrop-filter: blur(8px); transition: all .15s;
}
.exit-expand-btn:hover { background: rgba(255,59,48,0.8); }
.exit-expand-btn svg { width: 16px; height: 16px; }

/* ===== ADD ROOM MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6);
  align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary); border-radius: var(--radius); padding: 24px;
  width: 480px; max-width: 90vw; box-shadow: var(--shadow-lg);
}
.modal h3 { margin: 0 0 16px; font-size: 18px; font-weight: 600; color: var(--text-50); }
.modal-input {
  width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-default);
  background: var(--bg-tertiary); color: var(--text-50); font-size: 14px; outline: none; margin-bottom: 12px;
}
.modal-input:focus { border-color: var(--accent-primary); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

/* ===== UTILS ===== */
.hidden { display: none !important; }
.fade-in { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
  padding: 8px 20px; border-radius: 8px; background: var(--bg-700); color: var(--text-50);
  font-size: 14px; box-shadow: var(--shadow-lg); opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
:root.dark .toast { background: var(--background-700); }
:root:not(.dark) .toast, html:not(.dark) .toast { background: #333; }

/* 全屏 video 原生 controls 样式 */
video::-webkit-media-controls-panel { z-index: 2147483647; }
</style>
</head>

<script>
/* ============================================================
 * 状态管理
 * ============================================================ */
const state = {
  rooms: [
    { id: 'r1', title: '主播A的直播间', platform: '抖音', status: 'recording', previewEnabled: true, muted: false, quality: '高清', recordTime: 3661, markIn: 1800, markOut: 3500, clips: [{start:1800,end:3500}] },
    { id: 'r2', title: '主播B的直播间', platform: '虎牙', status: 'live', previewEnabled: true, muted: true, quality: '高清', recordTime: 7200, markIn: null, markOut: null, clips: [] },
    { id: 'r3', title: '主播C的游戏直播', platform: 'B站', status: 'live', previewEnabled: false, muted: true, quality: '标清', recordTime: 0, markIn: null, markOut: null, clips: [] },
    { id: 'r4', title: '主播D的聊天室', platform: '斗鱼', status: 'connecting', previewEnabled: false, muted: true, quality: '高清', recordTime: 0, markIn: null, markOut: null, clips: [] },
  ],
  selectedRoomIds: new Set(),
  selectedRoomId: null,
  isPlaying: false,
  previewPos: 1800,
  expandedRoomId: null,
  theme: 'dark',
  connStatus: 'connected',
  alignedRoomIds: new Set(),
};

/* ============================================================
 * 问题1: 修复勾选功能 — 点击两次能取消勾选
 * 根因: 反向同步 useEffect 依赖了 selectedRoomIds 导致循环
 * 修复: 用 ref 镜像判断, 不依赖 selectedRoomIds 触发 effect
 * ============================================================ */
const selectedRoomIdsRef = { current: new Set() };

function syncRef() { selectedRoomIdsRef.current = new Set(state.selectedRoomIds); }

function toggleCheckbox(roomId, event) {
  if (event) event.stopPropagation();
  const next = new Set(state.selectedRoomIds);
  if (next.has(roomId)) {
    next.delete(roomId);
  } else {
    next.add(roomId);
  }
  state.selectedRoomIds = next;
  // 正向同步: 仅当选中1个房间时同步到 store.selectedRoomId
  state.selectedRoomId = next.size === 1 ? [...next][0] : null;
  syncRef();
  renderRooms();
  renderControlBar();
  updateMultiSelectInfo();
}

function handleCardClick(roomId, event) {
  if (event.ctrlKey || event.metaKey) {
    toggleCheckbox(roomId, event);
  } else {
    state.selectedRoomIds = new Set([roomId]);
    state.selectedRoomId = roomId;
    syncRef();
    renderRooms();
    renderControlBar();
    updateMultiSelectInfo();
  }
}

/* 问题1修复核心: 反向同步时不依赖 selectedRoomIds 防止循环
 * 仅在 selectedRoomId 从外部变化(如 Dashboard 跳转)且不在集合中时同步 */
function syncFromStoreSelected() {
  if (state.selectedRoomId && !selectedRoomIdsRef.current.has(state.selectedRoomId)) {
    state.selectedRoomIds = new Set([state.selectedRoomId]);
    syncRef();
    renderRooms();
    renderControlBar();
    updateMultiSelectInfo();
  }
}

/* ============================================================
 * 问题2: "已同步" → "已选中", 时间线多选时正常工作
 * ============================================================ */
function updateMultiSelectInfo() {
  const indicator = document.getElementById('multiSelectIndicator');
  const text = document.getElementById('multiSelectText');
  const count = state.selectedRoomIds.size;
  if (count > 1) {
    indicator.classList.add('show');
    text.textContent = `${count} 个房间已选中 — 时间线 / 入出点 / 播放控制全局生效`;
  } else {
    indicator.classList.remove('show');
  }
  // 更新选中数量显示
  const info = document.getElementById('multiSelectInfo');
  if (count > 0) {
    info.textContent = `已选中 ${count} 个房间`;
  } else {
    info.textContent = '';
  }
}

/* 问题2: 多选时时间线取第一个选中房间的数据作为代表 */
function getRepresentativeRoom() {
  if (state.selectedRoomIds.size > 0) {
    const firstId = [...state.selectedRoomIds][0];
    return state.rooms.find(r => r.id === firstId);
  }
  return null;
}

/* ============================================================
 * 房间渲染
 * ============================================================ */
function renderRooms() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  state.rooms.forEach(room => {
    const selected = state.selectedRoomIds.has(room.id);
    const multiSelected = state.selectedRoomIds.size > 1 && selected;
    const aligned = state.alignedRoomIds.has(room.id);

    const card = document.createElement('div');
    card.className = 'room-card' + (selected ? ' selected' : '') + (multiSelected ? ' multi-selected' : '');
    card.onclick = (e) => handleCardClick(room.id, e);

    const statusColors = { recording: 'var(--state-error)', live: 'var(--state-success)', connecting: 'var(--state-warning)', error: 'var(--state-error)' };
    const statusTexts = { recording: '录制中', live: '直播中', connecting: '连接中', error: '错误' };
    const recordTimeStr = room.recordTime > 0 ? formatTime(room.recordTime) : '';

    card.innerHTML = `
      <div class="room-preview">

/* ============================================================
 * 问题3: 预览功能有声音 — 取消静音时 resume AudioContext
 * ============================================================ */
function toggleMute(roomId, event) {
  if (event) event.stopPropagation();
  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;
  room.muted = !room.muted;
  // 问题3修复: 取消静音时显式 resume AudioContext
  if (!room.muted) {
    resumeAudioContext(roomId);
    showToast('已取消静音');
  } else {
    showToast('已静音');
  }
  renderRooms();
}

function resumeAudioContext(roomId) {

/* ============================================================
 * 问题4: 预览清晰度切换后立即生效
 * 修复: 后端添加 set_preview_quality handler, 重启 MseStreamer
 * ============================================================ */
function changePreviewQuality(selectEl, roomId) {
  if (event) event.stopPropagation();
  const quality = selectEl.value;
  selectEl.classList.add('applying');
  // 问题4修复: 发送 set_preview_quality 到后端, 后端重启 MseStreamer
  console.log(`[PreviewQuality] Sending set_preview_quality: room=${roomId}, quality=${quality}`);
  showToast('正在切换清晰度...');
  // 模拟后端重启 MseStreamer 后的画面更新
  setTimeout(() => {
    if (roomId) {
      const room = state.rooms.find(r => r.id === roomId);
      if (room) room.quality = quality;
    }
    selectEl.classList.remove('applying');
    showToast('清晰度已更新');
    renderRooms();
  }, 1500);
}

/* ============================================================
 * ControlBar + Timeline 渲染
 * 问题2: 多选时时间线也正常工作 (取第一个选中房间)
 * ============================================================ */
function renderControlBar() {
  const room = getRepresentativeRoom() || state.rooms.find(r => r.id === state.selectedRoomId);
  if (!room) {
    document.getElementById('currentTime').textContent = '00:00:00';
    document.getElementById('totalTime').textContent = '04:00:00';
    return;
  }

  const TIMELINE_WINDOW = 14400;
  let elapsed = room.recordTime || 0;
  let duration = TIMELINE_WINDOW;
  let windowStart = 0;
  if (elapsed > TIMELINE_WINDOW) {
    windowStart = elapsed - TIMELINE_WINDOW;
  } else {
    duration = Math.max(TIMELINE_WINDOW, elapsed);
  }

  const currentTime = state.previewPos || room.markIn || 0;
  const relativeCurrent = Math.max(0, currentTime - windowStart);

  document.getElementById('currentTime').textContent = formatTime(currentTime);
  document.getElementById('totalTime').textContent = formatTime(duration);
  document.getElementById('timelineStart').textContent = formatTime(windowStart);
  document.getElementById('timelineEnd').textContent = formatTime(windowStart + duration);

  // Timeline 进度
  const progressPct = (relativeCurrent / duration) * 100;
  document.getElementById('timelineProgress').style.width = progressPct + '%';
  document.getElementById('timelinePlayhead').style.left = progressPct + '%';

  // Mark In/Out
  const markInEl = document.getElementById('timelineMarkIn');
  if (room.markIn != null) {
    markInEl.style.left = ((room.markIn - windowStart) / duration * 100) + '%';
    markInEl.style.display = 'block';
  } else {
    markInEl.style.display = 'none';
  }
  const markOutEl = document.getElementById('timelineMarkOut');
  if (room.markOut != null) {
    markOutEl.style.left = ((room.markOut - windowStart) / duration * 100) + '%';
    markOutEl.style.display = 'block';
  } else {
    markOutEl.style.display = 'none';
  }

  // 缓冲进度
  const bufferedEnd = Math.min(elapsed, windowStart + duration);
  const bufferedPct = ((bufferedEnd - windowStart) / duration) * 100;
  document.getElementById('timelineBuffered').style.width = bufferedPct + '%';
}

/* ============================================================
 * 时间线交互
 * ============================================================ */
function timelineClick(event) {
  const timeline = document.getElementById('timeline');
  const rect = timeline.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  const room = getRepresentativeRoom();
  if (!room) return;

  const TIMELINE_WINDOW = 14400;
  let elapsed = room.recordTime || 0;
  let duration = TIMELINE_WINDOW;
  let windowStart = 0;
  if (elapsed > TIMELINE_WINDOW) {
    windowStart = elapsed - TIMELINE_WINDOW;
  } else {
    duration = Math.max(TIMELINE_WINDOW, elapsed);
  }

  const targetTime = windowStart + pct * duration;
  state.previewPos = targetTime;
  // 问题2: 多选时 seek 对所有选中房间生效
  state.selectedRoomIds.forEach(rid => {
    console.log(`[Seek] Seeking room ${rid} to ${targetTime}`);
  });
  renderControlBar();
}

    console.log(`[PlayPause] Toggling room ${rid}`);
  });
}

function seekBack() {

function setMarkOut() {

function addClip() {

/* ============================================================
 * 问题7: 连接状态管理 (4种状态 + 重连按钮)
 * ============================================================ */
function updateConnStatus(status) {
  state.connStatus = status;
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  const reconnectBtn = document.getElementById('reconnectBtn');
  const banner = document.getElementById('connBanner');

  dot.className = 'conn-dot ' + status;
  const labels = { connected: '已连接', connecting: '连接中', disconnected: '未连接', reconnect_failed: '连接失败' };
  label.textContent = labels[status];

  // 重连按钮仅在断开/失败时显示
  if (status === 'disconnected' || status === 'reconnect_failed') {
    reconnectBtn.classList.add('show');
  } else {
    reconnectBtn.classList.remove('show');
  }

  // Banner
  if (status === 'disconnected' || status === 'reconnect_failed') {
    setTimeout(() => {
      if (state.connStatus === status) banner.classList.add('show');
    }, 2000);
  } else {
    banner.classList.remove('show');
  }
}

function doReconnect() {
  updateConnStatus('connecting');
  showToast('正在重新连接...');
  // 模拟重连
  setTimeout(() => {
    if (Math.random() > 0.3) {
      updateConnStatus('connected');
      showToast('连接成功');
    } else {
      updateConnStatus('reconnect_failed');
      showToast('连接失败，请检查后端服务');
    }
  }, 2000);
}

/* ============================================================

 * ============================================================ */
function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
